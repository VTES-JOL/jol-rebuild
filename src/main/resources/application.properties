# ── Security ──────────────────────────────────────────────────────────────────
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.landing-page=
quarkus.http.auth.form.login-page=
quarkus.http.auth.form.error-page=
quarkus.http.auth.form.http-only-cookie=true
quarkus.http.auth.form.post-location=/user/login

# ── Quarkus WebSockets Next ───────────────────────────────────────────────────
quarkus.websockets-next.server.auto-ping-interval=30S

# ── HTTP / CORS ───────────────────────────────────────────────────────────────
# CORS is only needed in dev (Vite runs on a different port).
# In production Quinoa serves the frontend from the same origin — no CORS needed.
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.quarkus.http.cors.methods=GET,POST,OPTIONS
%dev.quarkus.http.cors.headers=Content-Type,Authorization,Upgrade,Connection
%dev.quarkus.http.cors.access-control-allow-credentials=true

# ── Quinoa (frontend bundling) ────────────────────────────────────────────────
quarkus.quinoa.build-dir=dist
quarkus.quinoa.enable-spa-routing=true
%dev.quarkus.quinoa.dev-server.port=5173

# ── Jackson ───────────────────────────────────────────────────────────────────
quarkus.jackson.serialization-inclusion=non_null
quarkus.jackson.write-dates-as-timestamps=false

# ── Hibernate JSON columns ────────────────────────────────────────────────────
# Prevent Quarkus from wiring its REST Jackson config into Hibernate's JSON column
# formatter — REST customisations (non_null etc.) should not affect DB serialisation.
quarkus.hibernate-orm.mapping.format.global=ignore

# ── Security ──────────────────────────────────────────────────────────────────
quarkus.http.auth.permission.ws.paths=/ws/*
quarkus.http.auth.permission.ws.policy=authenticated

# ── Flyway ────────────────────────────────────────────────────────────────────
%dev.quarkus.flyway.enabled=false
%test.quarkus.flyway.enabled=false
%prod.quarkus.flyway.migrate-at-start=true

# ── Database ──────────────────────────────────────────────────────────────────
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASS}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}

# ── Card Data ─────────────────────────────────────────────────────────────────
%dev.jol.card-dir=csv
%test.jol.card-dir=csv
%prod.jol.card-dir=/csv

%prod.quarkus.http.proxy.proxy-address-forwarding = true
%prod.quarkus.http.proxy.enable-forwarded-host = true
%prod.quarkus.http.proxy.enable-forwarded-prefix = true

# ── Native image ──────────────────────────────────────────────────────────────
# Include NameService word-list resources in the native executable.
quarkus.native.resources.includes=net/deckserver/jol/**/*.txt