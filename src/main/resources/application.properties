%dev.quarkus.datasource.dev-ui.allow-sql=true

quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.landing-page=
quarkus.http.auth.form.login-page=
quarkus.http.auth.form.error-page=
quarkus.http.auth.form.http-only-cookie=true
quarkus.http.auth.form.post-location=/user/login

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Upgrade,Connection
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.ui-dir=src/main/webui

quarkus.jackson.serialization-inclusion=non_null
quarkus.jackson.write-dates-as-timestamps=false

quarkus.http.auth.permission.ws.paths=/ws/*
quarkus.http.auth.permission.ws.policy=authenticated

# How often Quarkus sends protocol-level pings (default is no automatic pings)
quarkus.websockets-next.server.auto-ping-interval=30S